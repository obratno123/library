<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Диалоги поддержки</title>
</head>
<body>
    <h1>Мои диалоги поддержки</h1>

    {% for dialog in dialogs %}
        <div style="margin-bottom: 15px; padding: 12px; border: 1px solid #ddd;">
            <p><strong>Пользователь:</strong> {{ dialog.user.username }}</p>
            <p><strong>Обновлён:</strong> {{ dialog.updated_at|date:"d.m.Y H:i" }}</p>
            <a href="{% url 'support_chat:support_dialog_detail' dialog.id %}">
                Открыть диалог
            </a>
        </div>
    {% empty %}
        <p>Диалогов пока нет.</p>
    {% endfor %}
</body>
</html>
