<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пароль изменён</title>
</head>
<body style="margin:0;padding:0;background:#fbf9f4;font-family:Arial,sans-serif;color:#1b1c19;">
    <div style="max-width:600px;margin:40px auto;background:#ffffff;padding:32px;border-radius:16px;border:1px solid #e4e2dd;">
        <div style="margin-bottom:24px;">
            <div style="font-size:30px;line-height:1.2;font-weight:700;color:#8d4b00;">
                Букинист
            </div>
        </div>

        <h1 style="margin:0 0 16px;font-size:28px;line-height:1.2;color:#1b1c19;">
            Пароль изменён
        </h1>

        <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#1b1c19;">
            Здравствуйте, <strong>{{ user.username }}</strong>!
        </p>

        <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#1b1c19;">
            Пароль от вашего аккаунта в <strong>{{ site_name }}</strong> был успешно изменён.
        </p>

        <div style="margin:24px 0;padding:18px 20px;background:#f5f3ee;border-radius:12px;">
            <p style="margin:0;font-size:14px;line-height:1.7;color:#554336;">
                Если это были не вы, срочно восстановите доступ к аккаунту и смените пароль.
            </p>
        </div>

        <p style="margin:24px 0 0;font-size:14px;line-height:1.7;color:#887364;">
            Это автоматическое письмо, отвечать на него не нужно.
        </p>
    </div>
</body>
</html>
