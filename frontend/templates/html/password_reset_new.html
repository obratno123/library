{% load static %}
<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Новый пароль — Букинист</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "secondary-fixed-dim": "#f7ba8a",
                  "on-secondary": "#ffffff",
                  "surface-dim": "#dbdad5",
                  "on-error": "#ffffff",
                  "on-background": "#1b1c19",
                  "tertiary-fixed": "#cee5ff",
                  "secondary": "#82542c",
                  "on-tertiary-fixed": "#001d32",
                  "on-secondary-container": "#784c25",
                  "outline": "#887364",
                  "surface-container-high": "#eae8e3",
                  "surface-container": "#f0eee9",
                  "error": "#ba1a1a",
                  "surface-container-lowest": "#ffffff",
                  "on-primary-container": "#fffbff",
                  "inverse-surface": "#30312e",
                  "error-container": "#ffdad6",
                  "surface-container-highest": "#e4e2dd",
                  "on-tertiary": "#ffffff",
                  "tertiary": "#006096",
                  "on-error-container": "#93000a",
                  "secondary-container": "#fdbf8f",
                  "on-tertiary-fixed-variant": "#004a75",
                  "tertiary-container": "#007abd",
                  "outline-variant": "#dbc2b0",
                  "surface-variant": "#e4e2dd",
                  "surface": "#fbf9f4",
                  "on-primary": "#ffffff",
                  "on-primary-fixed-variant": "#6e3900",
                  "inverse-on-surface": "#f2f1ec",
                  "surface-tint": "#904d00",
                  "on-secondary-fixed-variant": "#673d17",
                  "on-surface-variant": "#554336",
                  "primary-fixed-dim": "#ffb77d",
                  "on-tertiary-container": "#fdfcff",
                  "background": "#fbf9f4",
                  "on-surface": "#1b1c19",
                  "secondary-fixed": "#ffdcc3",
                  "primary": "#8d4b00",
                  "on-secondary-fixed": "#2f1500",
                  "primary-fixed": "#ffdcc3",
                  "tertiary-fixed-dim": "#96ccff",
                  "inverse-primary": "#ffb77d",
                  "surface-bright": "#fbf9f4",
                  "on-primary-fixed": "#2f1500",
                  "primary-container": "#b15f00",
                  "surface-container-low": "#f5f3ee"
                },
                fontFamily: {
                  "headline": ["Newsreader", "serif"],
                  "body": ["Manrope", "sans-serif"],
                  "label": ["Manrope", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
              },
            },
          }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
    <header class="w-full py-8 px-6 max-w-7xl mx-auto flex justify-center md:justify-start">
        <a class="text-3xl font-serif italic text-stone-900 tracking-tight" href="index.html">Букинист</a>
    </header>
    <main class="flex-grow flex items-center justify-center px-4 pb-12">
        <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 bg-surface-container-lowest overflow-hidden shadow-sm">
            <div class="hidden md:block relative h-full min-h-[600px] overflow-hidden bg-surface-container-low">
                <img alt="Уютная библиотека" class="absolute inset-0 w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCeRw0vgrfWYC-ZcLZWYUAKlr7tv4aMzoRu614r4pwnA02FSkZjQNJkp-2hAOvz6kLxuY_GJqNEpPcuRFOgebiIBaKMZmJwvEmSu3ux3Y4oph82JshMiXuWmz4ssFwmwd2D7YO_BGC1iGSqEtad6-SmC9J8QnTbeIZ1ZPeT9O6D35nJubQ-mt9ukXvRd-xaluPmF-T87IJy4bJ3RKcp0qQNAqwk6U69RBYimw0kWdi3K4GQw8geMfvO6jg1bm1Qf9ikmVGO-2NoF38"/>
                <div class="absolute inset-0 bg-gradient-to-tr from-primary/40 to-transparent"></div>
            </div>
            <div class="p-8 md:p-16 flex flex-col justify-center bg-surface-container-lowest">
                <div class="max-w-sm mx-auto w-full">
                    <header class="mb-10">
                        <h1 class="text-4xl font-serif text-on-surface mb-3 leading-none">Новый пароль</h1>
                        <p class="text-on-surface-variant font-body text-sm">Придумайте надежный пароль для защиты вашего аккаунта.</p>
                    </header>

                    {% if error %}
                        <p class="mb-4 text-sm text-red-600">{{ error }}</p>
                    {% endif %}

                    <form class="space-y-6" id="reset-new-password-form" method="post" action="{% url 'users:password_reset_new' %}">
                        {% csrf_token %}

                        <div class="space-y-1.5">
                            <label class="text-xs font-label uppercase tracking-wider text-on-surface-variant" for="new-password">Новый пароль</label>
                            <div class="relative">
                                <input class="w-full bg-surface-container-high border-none px-4 py-3.5 focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary/20 transition-all font-body text-on-surface placeholder-outline/50"
                                    id="new-password"
                                    name="password"
                                    placeholder="••••••••"
                                    required
                                    type="password"/>
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <label class="text-xs font-label uppercase tracking-wider text-on-surface-variant" for="confirm-password">Повторите пароль</label>
                            <div class="relative">
                                <input class="w-full bg-surface-container-high border-none px-4 py-3.5 focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary/20 transition-all font-body text-on-surface placeholder-outline/50"
                                    id="confirm-password"
                                    name="password_confirm"
                                    placeholder="••••••••"
                                    required
                                    type="password"/>
                            </div>
                        </div>

                        <div class="pt-4">
                            <button class="w-full bg-primary text-on-primary py-4 px-6 font-label font-bold tracking-wide shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] hover:bg-primary-container active:scale-[0.98] transition-all duration-200"
                                    type="submit">
                                Сменить пароль
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer class="w-full py-6 px-6 text-center">
        <p class="text-outline text-[11px] font-label uppercase tracking-[0.2em]">© 2024 Букинист. Цифровой Куратор Ваших Знаний.</p>
    </footer>
    <script>
        // Simple password toggle logic
        document.querySelectorAll('[data-toggle-password]').forEach(button => {
            button.addEventListener('click', () => {
                const inputId = button.getAttribute('data-toggle-password');
                const input = document.getElementById(inputId);
                const icon = button.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        });
    </script>
</body>
</html>
