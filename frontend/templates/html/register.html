<!DOCTYPE html>

<html class="light" lang="ru"><head>
<meta charset="utf-8"/><title>Букинист — Регистрация</title>

<link href="css/register.css" rel="stylesheet"/></head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Auth Layout Wrapper -->
<main class="flex-grow flex items-stretch overflow-hidden min-h-screen">
<!-- Left Column: Visual/Editorial (Hidden on small screens) -->
<section class="hidden lg:flex lg:w-1/2 relative flex-col justify-end p-16 overflow-hidden bg-surface-container-highest">
<div class="absolute inset-0 z-0">
<img alt="Atmospheric library" class="w-full h-full object-cover opacity-80" data-alt="Moody atmospheric library with floor-to-ceiling wooden bookshelves filled with antique books and soft warm lantern light filtering through dust motes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCkkkpdbP0u4hKFQvg-DAGRlbiTJOWR5R36pamskfvsTy6WkvZpJ-b-SdkMEfXns--oU9Mg6kboyz_ZcJUUrPD9n0-5bQ1XPwopfWYU1aYyHYRC2vhrUD0y5iyNY10duQudgu-0EROWXsqpeRaxIjneDC6ax5LopTRrVwsoF2bMpAmG7dAcD3pY_Qs1PjkcBFm_CAYj9GKSNfaTfrZiq7y2xQxWuTcc__zwVyvKQj_1qS1iJeWxLBtsZmOSvYIYDFRo0YdC3YSPaM"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
</div>
<div class="relative z-10 max-w-lg">
<div class="mb-8">
<span class="font-serif italic text-3xl text-primary">Букинист</span>
</div>
</div>
</section>
<!-- Right Column: Registration Form -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-6 md:p-12 bg-surface">
<div class="w-full max-w-md">
<!-- Mobile Branding -->
<div class="lg:hidden mb-12 flex justify-center">
<span class="font-serif italic text-4xl text-primary">Букинист</span>
</div>
<div class="mb-10 text-center lg:text-left">
<h1 class="font-serif text-4xl mb-2 text-on-surface">Регистрация</h1>
<p class="text-on-surface-variant font-body">Создайте аккаунт, чтобы начать свою коллекцию</p>
</div>
<form class="space-y-6" id="register-form">
<!-- Name Field -->
<div class="space-y-2">
<label class="block text-sm font-label font-semibold text-on-surface-variant px-1" for="register-username">Логин</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3.5 focus:ring-0 focus:bg-surface-container-lowest transition-all duration-300 font-body placeholder:text-outline/50" id="register-username" name="username" placeholder="alex_pushkin" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-label font-semibold text-on-surface-variant px-1" for="register-email">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3.5 focus:ring-0 focus:bg-surface-container-lowest transition-all duration-300 font-body placeholder:text-outline/50" id="register-email" name="email" placeholder="reader@archive.ru" type="email"/>
</div>
</div>
<!-- Password Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-sm font-label font-semibold text-on-surface-variant px-1" for="register-password">Пароль</label>
<input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3.5 focus:ring-0 focus:bg-surface-container-lowest transition-all duration-300 font-body" id="register-password" name="password" required="" type="password"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-label font-semibold text-on-surface-variant px-1" for="register-password-confirm">Повторите пароль</label>
<input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3.5 focus:ring-0 focus:bg-surface-container-lowest transition-all duration-300 font-body" id="register-password-confirm" name="password_confirm" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-label font-bold py-4 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all duration-200 letterpress-shadow flex items-center justify-center gap-2" id="register-submit" type="submit">Создать аккаунт<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span></button>
<p class="hidden mt-4 text-sm font-body" id="register-message"></p>
</div>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-8 border-t border-outline-variant/20 text-center font-body">
<p class="text-on-surface-variant text-sm">
                        Уже есть аккаунт? 
                        <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 decoration-2" href="login.html">Войти</a>
</p>
</div>
<!-- Terms -->
<p class="mt-12 text-[11px] text-center text-outline leading-relaxed px-4">
                    Нажимая «Создать аккаунт», вы соглашаетесь с нашей <a class="underline" href="#">Политикой конфиденциальности</a> и <a class="underline" href="#">Условиями использования</a> сервиса.
                </p>
</div>
</section>
</main>
<!-- Aesthetic Decorative Element: Paper Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-multiply z-50">
<svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noiseFilter">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
</svg>
</div>
<script src="js/config.js"></script>
<script src="js/auth-common.js"></script>
<script src="js/register.js"></script>
<script src="js/auth-links.js"></script>
</body></html>
